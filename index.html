<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>고팡</title>
  <style>
    /* ── Apple HIG 토큰 ─────────────────────────────────── */
    :root {
      --bg:           #09090F;
      --bg-elevated:  rgba(28,28,30,0.92);
      --bg-glass:     rgba(44,44,46,0.72);
      --bg-input:     rgba(58,58,60,0.9);
      --sep:          rgba(255,255,255,0.08);
      --sep-strong:   rgba(255,255,255,0.14);
      --label:        rgba(255,255,255,0.96);
      --label-2:      rgba(255,255,255,0.55);
      --label-3:      rgba(255,255,255,0.28);
      --tint:         #0A84FF;
      --tint-dim:     rgba(10,132,255,0.18);
      --green:        #30D158;
      --red:          #FF453A;
      --yellow:       #FFD60A;
      --orange:       #FF9F0A;
      --r-sm:         10px;
      --r-md:         14px;
      --r-lg:         20px;
      --r-xl:         26px;
      --blur:         saturate(180%) blur(24px);
      --blur-sm:      saturate(160%) blur(12px);
      --font:         -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --font-display: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--label);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Apple HIG macOS 다크 — 미세 방사형 하이라이트 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%,
          rgba(10,132,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 100% 100%,
          rgba(94,92,230,0.05) 0%, transparent 60%);
    }
    #app { position: relative; z-index: 1; }

    /* ── 앱 레이아웃 ────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    /* ── 상단 여백 (헤더 없음 — 요구사항) ─────────────── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 18px;
      gap: 10px;
      /* 완전 투명 — 내용 없음 */
    }

    /* ── 우상단 버튼 그룹 ──────────────────────────────── */
    .top-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--bg-glass);
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm);
      color: var(--label);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: background 0.15s, transform 0.12s var(--ease-spring);
      -webkit-tap-highlight-color: transparent;
    }
    .top-btn:hover  { background: rgba(255,255,255,0.12); }
    .top-btn:active { transform: scale(0.93); }

    .btn-ai {
      width: auto;
      padding: 0 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--tint);
      gap: 5px;
    }
    .btn-ai .ai-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--tint);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .btn-ai.active { background: var(--tint-dim); color: var(--tint); }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── 메시지 영역 ────────────────────────────────────── */
    #message-list {
      flex: 1;
      overflow-y: auto;
      padding: 60px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }
    #message-list::-webkit-scrollbar { width: 0; }

    .msg-row {
      display: flex;
      padding: 3px 16px;
      animation: msg-in 0.28s var(--ease-out) both;
    }
    @keyframes msg-in {
      from { opacity:0; transform: translateY(10px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .msg-row.user  { justify-content: flex-end; }
    .msg-row.ai    { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: var(--r-lg);
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-user {
      background: var(--tint);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-ai {
      background: var(--bg-glass);
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm);
      color: var(--label);
      border-bottom-left-radius: 4px;
    }

    /* 위험 배지 (버블 아래 inline) */
    .risk-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .risk-chip.s0 { background: rgba(48,209,88,0.18);  color: var(--green);  }
    .risk-chip.s1 { background: rgba(255,214,10,0.18); color: var(--yellow); }
    .risk-chip.s2 { background: rgba(255,159,10,0.18); color: var(--orange); }
    .risk-chip.s3 { background: rgba(255,69,58,0.18);  color: var(--red);    }

    /* AI 타이핑 인디케이터 */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--label-2);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* ── 하단 입력 영역 (Apple Messages / Claude.ai 스타일) */
    .input-dock {
      flex-shrink: 0;
      padding: 8px 12px 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--sep);
    }

    /* 상태 바 (한 줄, 소형) */
    .status-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px 8px;
      font-size: 11px;
      color: var(--label-3);
      letter-spacing: 0.01em;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .status-strip code {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 10px;
      color: var(--label-3);
    }

    /* 입력 컨테이너 */
    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-input);
      border-radius: var(--r-xl);
      padding: 6px 6px 6px 10px;
      border: 1px solid var(--sep-strong);
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within {
      border-color: rgba(10,132,255,0.5);
    }

    /* 좌측 액션 버튼 */
    .input-actions-left {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      padding-bottom: 2px;
    }
    .ia-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--label-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .ia-btn:hover  { color: var(--label); background: rgba(255,255,255,0.06); }
    .ia-btn:active { transform: scale(0.9); }

    /* 버전 선택 드롭다운 */
    .version-select {
      background: transparent;
      border: none;
      color: var(--label-2);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      padding: 4px 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .version-select:hover { color: var(--label); }
    .version-select option { background: #1c1c1e; }

    /* textarea */
    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--label);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.4;
      resize: none;
      max-height: 140px;
      min-height: 22px;
      overflow-y: auto;
      padding: 4px 0;
      align-self: flex-end;
    }
    #msg-input::placeholder { color: var(--label-3); }
    #msg-input::-webkit-scrollbar { width: 0; }

    /* 전송 버튼 */
    .send-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--tint);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
      transition: background 0.15s, transform 0.1s var(--ease-spring), opacity 0.15s;
      align-self: flex-end;
    }
    .send-btn:disabled { background: var(--bg-glass); opacity: 0.4; }
    .send-btn:not(:disabled):hover  { background: #0071e3; }
    .send-btn:not(:disabled):active { transform: scale(0.88); }

    /* ── 설정 패널 ──────────────────────────────────────── */
    .settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .settings-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .settings-sheet {
      width: 100%;
      max-width: 520px;
      background: var(--bg-elevated);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s var(--ease-out);
      border-top: 1px solid var(--sep-strong);
    }
    .settings-overlay.open .settings-sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--sep-strong);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .sheet-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      color: var(--label);
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .setting-group {
      margin-bottom: 20px;
    }
    .setting-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--label-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .setting-field {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--sep-strong);
      border-radius: var(--r-md);
      color: var(--label);
      font-family: var(--font);
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }
    .setting-field:focus { border-color: var(--tint); }
    .setting-field option { background: #1c1c1e; }

    .setting-field-mono {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 13px;
      letter-spacing: 0.01em;
    }
    .setting-field::placeholder { color: var(--label-3); }

    .sheet-save {
      width: 100%;
      padding: 13px;
      background: var(--tint);
      border: none;
      border-radius: var(--r-md);
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }
    .sheet-save:hover  { background: #0071e3; }
    .sheet-save:active { transform: scale(0.98); }

    /* ── AI 비서 시스템 패널 ────────────────────────────── */
    .ai-overlay {
      position: fixed; inset: 0;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .ai-overlay.open { opacity: 1; pointer-events: all; }
    .ai-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ai-card {
      position: relative;
      width: 90%;
      max-width: 380px;
      background: var(--bg-elevated);
      border-radius: var(--r-xl);
      padding: 24px 20px 20px;
      border: 1px solid var(--sep-strong);
      transform: scale(0.94) translateY(8px);
      transition: transform 0.24s var(--ease-spring);
    }
    .ai-overlay.open .ai-card { transform: scale(1) translateY(0); }

    .ai-card-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0A84FF, #5E5CE6);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
    }
    .ai-card-title {
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .ai-card-sub {
      font-size: 13px;
      color: var(--label-2);
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .ai-card-btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--r-md);
      border: none;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .ai-card-btn:active { transform: scale(0.97); }
    .ai-card-btn-primary { background: var(--tint); color: #fff; }
    .ai-card-btn-primary:hover { background: #0071e3; }
    .ai-card-btn-secondary {
      background: var(--bg-input);
      color: var(--label-2);
    }

    /* ── 파일 첨부 미리보기 ─────────────────────────────── */
    .attach-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-glass);
      border-radius: var(--r-md);
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--label-2);
    }
    .attach-preview .remove-attach {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--label-3);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      width: auto; height: auto;
      border-radius: 0;
    }

    /* ── 반응형 ─────────────────────────────────────────── */
    @media (min-width: 680px) {
      .input-dock { padding: 8px 20% 28px; }
      #message-list { padding: 60px 16% 16px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── 상단 바 (빈 영역 + 우상단 버튼만) ───────────── -->
  <div class="top-bar">
    <!-- 검색 버튼 -->
    <button class="top-btn" id="btn-search" onclick="openSearch()" title="검색">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <!-- AI 비서 버튼 -->
    <button class="top-btn btn-ai" id="btn-ai" onclick="toggleAI()" title="AI 비서">
      <span class="ai-dot" id="ai-dot"></span>
      AI
    </button>
    <!-- 설정 버튼 -->
    <button class="top-btn" id="btn-settings" onclick="openSettings()" title="설정">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                 a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                 A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                 l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                 A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                 l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                 a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                 l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                 a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- ── 메시지 목록 ─────────────────────────────────── -->
  <div id="message-list"></div>

  <!-- ── 하단 입력 독 ───────────────────────────────── -->
  <div class="input-dock">

    <!-- 상태 스트립 -->
    <div class="status-strip">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">PDV 암호화</span>
      <span>·</span>
      <span>OpenHash <code id="hash-ref">대기중</code></span>
      <span id="layer-lbl">L1</span>
      <span style="margin-left:auto">
        <select class="version-select" id="version-select" title="고팡 버전"
                style="color:var(--label-2);font-size:11px">
          <option value="v2">고팡 v2</option>
          <option value="v1">고팡 v1</option>
        </select>
      </span>
    </div>

    <!-- 첨부 미리보기 -->
    <div id="attach-preview" style="display:none" class="attach-preview">
      <span>📎</span>
      <span id="attach-name"></span>
      <button class="remove-attach" onclick="removeAttach()">✕</button>
    </div>

    <!-- 입력 래퍼 -->
    <div class="input-wrap">

      <!-- 좌측 버튼 그룹 -->
      <div class="input-actions-left">
        <!-- + 첨부 -->
        <button class="ia-btn" onclick="triggerAttach()" title="파일 첨부">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>

        <!-- 마이크 -->
        <button class="ia-btn" id="btn-mic" onclick="toggleMic()" title="음성 입력">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- 텍스트 입력 -->
      <textarea id="msg-input"
                placeholder="메시지를 입력하세요…"
                rows="1"
                oninput="autoResize(this); updateSendBtn()"
                onkeydown="handleKey(event)"></textarea>

      <!-- 전송 버튼 -->
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
        </svg>
      </button>
    </div>

    <input type="file" id="file-input" style="display:none"
           accept=".pdf,.jpg,.png,.txt,.docx"
           onchange="handleFileSelect(event)"/>
  </div>
</div>

<!-- ── 검색 오버레이 ──────────────────────────────────── -->

// ── 메시지 전송 ─────────────────────────────────────────
async function sendMessage() {
  const inp  = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;

  appendBubble('user', text);
  history.push({ role: 'user', content: text });
  inp.value = '';
  inp.style.height = 'auto';
  updateSendBtn();
  removeAttach();

  if (aiActive) {
    await callAI(text);
  } else {
    // 고팡 파이프라인 — 백그라운드 분석만, 결과는 표시 안 함
    // (§ 요구사항: 대화 중 분석 결과 노출 금지. 사용자 요청 시에만 표시)
    _runPipelineBackground(text);
    appendBubble('ai', '🔵 AI 버튼을 눌러 AI 비서를 활성화하세요.');
  }
}

// ── 고팡 파이프라인 백그라운드 실행 ─────────────────────
// 대화 중 결과를 표시하지 않음 — 사용자 요청 시 showRiskAnalysis() 호출
let _lastPipelineResult = null;

async function _runPipelineBackground(text) {
  try {
    const { runPipeline } = await import('./src/ai-secretary/pipeline.js');
    const result = await runPipeline(
      { content: text, senderId: 'user', attachment: attachFile ?? null },
      {}
    );
    _lastPipelineResult = result;

    // OpenHash ref는 상태 바에만 조용히 업데이트
    if (result?.anchorHash) {
      const el = document.getElementById('hash-ref');
      if (el) el.textContent = result.anchorHash.slice(0, 8) + '…';
    }

    // S3 감지 시 즉시 경고 (위험 등급 S3만 예외적으로 즉시 표시)
    if (result?.riskResult?.level === 'S3') {
      const chip = riskChip('S3', result.riskResult.legalFlags ?? []);
      appendBubble('ai',
        `🛑 위험 감지 — 즉시 확인이 필요합니다. ${chip}`, true);
    }
  } catch (e) {
    // 파이프라인 오류는 콘솔에만 기록, 사용자에게 표시하지 않음
    console.warn('[Pipeline]', e.message);
  }
}

// 사용자 요청 시 분석 결과 표시 (예: "분석 결과 보여줘")
function showRiskAnalysis() {
  if (!_lastPipelineResult) {
    appendBubble('ai', '분석된 메시지가 없습니다.');
    return;
  }
  const r   = _lastPipelineResult.riskResult;
  const chip = riskChip(r?.level ?? 'S0', r?.legalFlags ?? []);
  appendBubble('ai',
    `분석 완료 ${chip}${r?.legalFlags?.length ? '<br>' + r.legalFlags.join(' · ') : ''}`,
    true);
}

// ── DeepSeek API 호출 ───────────────────────────────────
async function callAI(userText) {
  showTyping();
  const messages = [
    { role: 'system', content: CFG.system },
    ...history.slice(-20),   // 최근 20턴
  ];

  // 엔드포인트 결정
  const baseUrl = document.getElementById('setting-endpoint')?.value === 'custom'
    ? document.getElementById('custom-endpoint-url')?.value || CFG.endpoint
    : CFG.endpoint;

  try {
    const res = await fetch(`${baseUrl}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${CFG.apiKey}`,
      },
      body: JSON.stringify({
        model:       CFG.model,
        messages,
        max_tokens:  2048,
        temperature: 0.7,
        stream:      false,
      }),
    });

    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content ?? '응답 없음';

    hideTyping();
    history.push({ role: 'assistant', content: reply });
    appendBubble('ai', reply);

  } catch (err) {
    hideTyping();
    appendBubble('ai', `⚠️ API 오류: ${err.message}`);
    console.error('[AI]', err);
  }
}

// ── 버블 렌더링 ─────────────────────────────────────────
function appendBubble(role, text, isHTML = false) {
  const list = document.getElementById('message-list');
  const row  = document.createElement('div');
  row.className = `msg-row ${role}`;

  const bubble = document.createElement('div');
  bubble.className = `bubble bubble-${role}`;
  if (isHTML) bubble.innerHTML = text;
  else        bubble.textContent = text;

  row.appendChild(bubble);
  list.appendChild(row);
  list.scrollTop = list.scrollHeight;
}

function riskChip(level, flags) {
  const map = { S0:'✅ 안전', S1:'⚠️ 주의', S2:'🚨 경고', S3:'🛑 차단' };
  const cls = level.toLowerCase();
  const label = map[level] ?? '—';
  const flagStr = flags.length ? ` · ${flags.slice(0,3).join(' ')}` : '';
  return `<span class="risk-chip ${cls}">${label}${flagStr}</span>`;
}

let typingEl = null;
function showTyping() {
  const list = document.getElementById('message-list');
  typingEl = document.createElement('div');
  typingEl.className = 'msg-row ai';
  typingEl.id = 'typing-row';
  typingEl.innerHTML = `<div class="typing-indicator">
    <span></span><span></span><span></span>
  </div>`;
  list.appendChild(typingEl);
  list.scrollTop = list.scrollHeight;
}
function hideTyping() {
  document.getElementById('typing-row')?.remove();
  typingEl = null;
}

  appendBubble('ai', `⚙️ 설정 저장: ${CFG.model}`);

    if (saved.endpoint) CFG.endpoint = saved.endpoint;

  if (!q) return;

  const resultEl = document.getElementById('search-result');
  resultEl.innerHTML = '<span style="color:var(--label-3)">🔍 검색 중...</span>';

  // AI에게 검색 요청 — 검색 결과를 채팅창에도 전달
  const searchPrompt = `웹 검색 요청: "${q}"
위치: PDV 기준 현재 위치 사용.
검색 결과를 바탕으로 답변하고, AI 비서 유무도 탐지해 주세요.`;

  // 검색창 닫고 채팅으로 전달
  closeSearch();
  document.getElementById('msg-input').value = searchPrompt;
  autoResize(document.getElementById('msg-input'));
  updateSendBtn();

  resultEl.innerHTML = '<span style="color:var(--label-3)">검색 결과가 여기에 표시됩니다.</span>';
  document.getElementById('search-input').value = '';
}

// ── GUID 상태 스트립 표시 ────────────────────────────────
function showGUID() {
  const el = document.getElementById('status-text');
  if (el) el.title = `GUID: ${USER_GUID}`;
}

// ── 파일 첨부 ───────────────────────────────────────────
function triggerAttach() {
  document.getElementById('file-input').click();
}
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  attachFile = file;
  document.getElementById('attach-name').textContent = file.name;
  document.getElementById('attach-preview').style.display = 'flex';
  e.target.value = '';
}
function removeAttach() {
  attachFile = null;
  document.getElementById('attach-preview').style.display = 'none';
  document.getElementById('attach-name').textContent = '';
}

// ── 마이크 (Web Speech API) ─────────────────────────────
function toggleMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    appendBubble('ai', '이 브라우저는 음성 입력을 지원하지 않습니다.');
    return;
  }

  if (micActive) {
    recognition?.stop();
    micActive = false;
    document.getElementById('btn-mic').style.color = '';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    document.getElementById('msg-input').value = t;
    autoResize(document.getElementById('msg-input'));
    updateSendBtn();
    micActive = false;
    document.getElementById('btn-mic').style.color = '';
  };
  recognition.onerror = () => {
    micActive = false;
    document.getElementById('btn-mic').style.color = '';
  };
  recognition.onend = () => { micActive = false; };

  recognition.start();
  micActive = true;
  document.getElementById('btn-mic').style.color = 'var(--red)';
}
</script>
</body>
